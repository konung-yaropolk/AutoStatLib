name: Upload Python Package
 
on:
  release:
    types: [published]
 
permissions:
  contents: read
 
jobs:
  test:
    runs-on: ubuntu-latest
 
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
 
    steps:
      - uses: actions/checkout@v4
 
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
 
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          pip install .
 
      - name: Run tests
        run: pytest tests/ -v
 
  release-build:
    runs-on: ubuntu-latest
    needs: test            # ← won't build unless all 3 Python versions pass
 
    steps:
      - uses: actions/checkout@v4
 
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
 
      - name: Build release distributions
        run: |
          python -m pip install build
          python -m build
 
      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: release-dists
          path: dist/
 
  pypi-publish:
    runs-on: ubuntu-latest
    needs:
      - release-build      # unchanged — still waits for the build artifact
    permissions:
      id-token: write
 
    environment:
      name: pypi
      url: https://pypi.org/p/AutoStatLib
 
    steps:
      - name: Retrieve release distributions
        uses: actions/download-artifact@v4
        with:
          name: release-dists
          path: dist/
 
      - name: Publish release distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
 