name: Run Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: |
          pip install -e .
          pip install pytest

      - name: Type-check with mypy
        run: |
          pip install mypy
          mypy src/AutoStatLib/ --ignore-missing-imports --no-strict-optional

      - name: Run tests
        run: pytest tests/ -v